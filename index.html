  <template id="panel-active"><h2 class="drawer-title active-title" id="drawer-title">Active Operations</h2><p class="drawer-subtitle">Units driving IP development, core technology, or active market presence.</p><section class="drawer-section"><h3 class="section-title">Fintech & Service Infrastructure</h3><div class="card-grid"><a class="card" href="https://www.laundr.me/"><span class="card-icon">∞</span><h3><span class="brand-laundr-root">laundr</span><span class="brand-laundr-dot">.me</span></h3><span class="tag">Core OS</span><p>A vertically integrated operating system for the independent workforce: P2P payments, bookings, CRM, activity history, trust tooling, and talent discovery.</p></a><a class="card" href="https://moneymsg.laundr.me/"><span class="card-icon">$</span><h3><span class="brand-money">Money</span><span class="brand-msg">Msg</span></h3><span class="tag">Sub-product</span><p>Conversation-native payment initiation connected to the laundr.me fintech ecosystem for send, request, split, and claim flows.</p></a></div></section><section class="drawer-section"><h3 class="section-title">Design & Specialized Apparel</h3><div class="card-grid"><article class="card"><span class="card-icon"><svg class="mini-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M20 4 8.12 15.88"></path><path d="M14.47 14.48 20 20"></path><path d="M8.12 8.12 12 12"></path></svg></span><h3><span class="brand-apex-prefix">APEX</span>undies</h3><p>Premium private-label underwear handling design, manufacturing, and direct-to-consumer distribution.</p></article><a class="card" href="https://bulgesandbottoms.com/"><span class="card-icon">◈</span><h3>Bulges <span class="brand-bb-amp">&amp;</span> Bottoms</h3><span class="tag">Live Domain</span><p>Curated inclusive apparel boutique with personality-forward positioning and role-based product discovery.</p></a><article class="card"><span class="card-icon">✦</span><h3>Clstrfck Industries</h3><p>High-impact design studio specializing in aggressive product posture and non-traditional niche branding.</p></article></div></section><section class="drawer-section"><h3 class="section-title">Analytics & Research</h3><div class="card-grid"><article class="card"><span class="card-icon">◷</span><h3>Scratch That</h3><p>Specialized lottery audit and analytics platform using statistical models to track game performance and surface objective user probability.</p></article><article class="card"><span class="card-icon">▤</span><h3>Biblical Truths Trilogy</h3><p>A forensic nonfiction series applying modern analytical frameworks to ancient historical data.</p></article></div></section></template>

  <template id="panel-legacy"><h2 class="drawer-title legacy-title" id="drawer-title">Legacy Portfolio</h2><p class="drawer-subtitle">Stabilized or retired entities; architectural foundations.</p><section class="drawer-section"><h3 class="section-title">Foundational Architecture</h3><div class="card-grid"><article class="card"><span class="card-icon">⚒</span><h3>Shore Assembly</h3><p>Legacy handyman business for localized assembly and household infrastructure.</p></article><article class="card"><span class="card-icon">▧</span><h3>TechSolve NJ</h3><p>Legacy PC repair and upgrade node for commercial and residential hardware support.</p></article><article class="card"><span class="card-icon">▣</span><h3>CR Tech Solutions</h3><p>Legacy technical consulting and specialized data recovery services.</p></article></div></section></template>
  <script>
    (()=>{const drawer=document.getElementById('portfolio-drawer');const panel=drawer.querySelector('.drawer-panel');const content=document.getElementById('drawer-content');const closeButton=drawer.querySelector('.drawer-close');const buttons=Array.from(document.querySelectorAll('.dock-button'));let activeButton=null;let cleanupFocal=null;function clearFocalTracker(){if(cleanupFocal){cleanupFocal();cleanupFocal=null}}function setupFocalTracker(){clearFocalTracker();const cards=Array.from(content.querySelectorAll('.card'));if(!cards.length)return;let raf=0;function update(){raf=0;const panelRect=panel.getBoundingClientRect();const isMobile=window.matchMedia('(max-width:760px)').matches;const focusY=panelRect.top+panelRect.height*(isMobile?.58:.42);const maxScroll=Math.max(0,panel.scrollHeight-panel.clientHeight);const nearBottom=panel.scrollTop>=maxScroll-Math.max(96,panel.clientHeight*.18);let best=nearBottom?cards[cards.length-1]:null;let bestScore=Infinity;if(!best){cards.forEach(card=>{const rect=card.getBoundingClientRect();const visible=rect.bottom>panelRect.top+28&&rect.top<panelRect.bottom-28;const center=rect.top+rect.height/2;const score=Math.abs(center-focusY)+(visible?0:10000);if(score<bestScore){bestScore=score;best=card}})}cards.forEach(card=>card.classList.toggle('is-focal',card===best))}function request(){if(!raf)raf=requestAnimationFrame(update)}panel.addEventListener('scroll',request,{passive:true});window.addEventListener('resize',request,{passive:true});cards.forEach(card=>{card.addEventListener('focusin',()=>{cards.forEach(candidate=>candidate.classList.toggle('is-focal',candidate===card))});card.addEventListener('mouseenter',()=>{cards.forEach(candidate=>candidate.classList.toggle('is-focal',candidate===card))})});request();cleanupFocal=()=>{panel.removeEventListener('scroll',request);window.removeEventListener('resize',request);if(raf)cancelAnimationFrame(raf);cards.forEach(card=>card.classList.remove('is-focal'))}}function openPanel(panelName,button){const template=document.getElementById(`panel-${panelName}`);if(!template)return;clearFocalTracker();content.innerHTML='';content.appendChild(template.content.cloneNode(true));drawer.dataset.theme=panelName;drawer.classList.add('open');drawer.setAttribute('aria-hidden','false');buttons.forEach(candidate=>candidate.classList.remove('active'));button.classList.add('active');activeButton=button;panel.scrollTop=0;closeButton.focus({preventScroll:true});requestAnimationFrame(setupFocalTracker)}function closeDrawer(){clearFocalTracker();drawer.classList.remove('open');drawer.setAttribute('aria-hidden','true');delete drawer.dataset.theme;buttons.forEach(candidate=>candidate.classList.remove('active'));if(activeButton)activeButton.focus({preventScroll:true});activeButton=null}content.addEventListener('submit',event=>{const form=event.target;if(!form.matches('[data-contact-form]'))return;event.preventDefault();const data=new FormData(form);const name=String(data.get('name')||'').trim();const email=String(data.get('email')||'').trim();const phone=String(data.get('phone')||'').trim();const subject=String(data.get('subject')||'TopherLoring Inquiry').trim();const message=String(data.get('message')||'').trim();const body=['Name: '+name,'Email: '+email,phone?'Phone: '+phone:'','',message].filter(Boolean).join('\n');window.location.href='mailto:info@topherloring.com?subject='+encodeURIComponent('TopherLoring inquiry: '+subject)+'&body='+encodeURIComponent(body)});buttons.forEach(button=>button.addEventListener('click',()=>openPanel(button.dataset.panel,button)));closeButton.addEventListener('click',closeDrawer);drawer.addEventListener('click',event=>{if(event.target===drawer)closeDrawer()});document.addEventListener('keydown',event=>{if(event.key==='Escape'&&drawer.classList.contains('open'))closeDrawer()})})();
  </script>
