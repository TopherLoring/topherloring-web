    <style>
      :root {

      * { box-sizing: border-box; }

      .shell {
        position: relative;

        width: min(100% - 34px, 840px);

      .hero-inner { width: 100%; max-width: 720px; }
      .crest-row { display: grid; grid-template-columns: minmax(54px, 1fr) auto minmax(54px, 1fr); align-items: center; gap: 16px; width: min(100%, 320px); margin: 0 auto clamp(34px, 5vh, 48px); }
      .crest-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.32), transparent); }
      .crest { width: clamp(54px, 12vw, 66px); height: clamp(54px, 12vw, 66px); display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.35); border-radius: 999px; background: rgba(255,255,255,0.014); box-shadow: 0 0 28px rgba(255,255,255,0.1); }
      .crest span { width: 70%; height: 70%; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.38); border-radius: 999px; font-family: Georgia, ui-serif, serif; font-size: clamp(19px, 4.6vw, 25px); font-weight: 800; background: linear-gradient(130deg, #fff 0%, #00f8f8 42%, #7b4cff 61%, #ff0088 86%); -webkit-background-clip: text; background-clip: text; color: transparent; }

      .industry-row { display: grid; grid-template-columns: minmax(32px, 1fr) auto minmax(32px, 1fr); align-items: center; gap: clamp(13px, 3vw, 22px); width: min(100%, 430px); margin: clamp(24px, 4vh, 34px) auto 0; }

    <script>
      (() => {
        const drawer = document.getElementById('portfolio-drawer');
        const content = document.getElementById('drawer-content');
        const closeButton = drawer.querySelector('.drawer-close');
        const buttons = Array.from(document.querySelectorAll('.dock-button'));
        let activeButton = null;

        function openPanel(panelName, button) {
          const template = document.getElementById(`panel-${panelName}`);
          if (!template) return;
          content.innerHTML = '';
          content.appendChild(template.content.cloneNode(true));
          drawer.classList.add('open');
          drawer.setAttribute('aria-hidden', 'false');
          buttons.forEach((candidate) => candidate.classList.remove('active'));
          button.classList.add('active');
          activeButton = button;
          closeButton.focus({ preventScroll: true });
        }

        function closeDrawer() {
          drawer.classList.remove('open');
          drawer.setAttribute('aria-hidden', 'true');
          buttons.forEach((candidate) => candidate.classList.remove('active'));
          if (activeButton) activeButton.focus({ preventScroll: true });
          activeButton = null;
        }

        buttons.forEach((button) => {
          button.addEventListener('click', () => openPanel(button.dataset.panel, button));
        });

        closeButton.addEventListener('click', closeDrawer);
        drawer.addEventListener('click', (event) => {
          if (event.target === drawer) closeDrawer();
        });
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
        });
      })();
    </script>
